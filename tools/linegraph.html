<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Line Graph</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; }
  </style>
  <script src="shared.js"></script>
  <script src="shared-components.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useMemo, useCallback, useRef, forwardRef } = React;

const PALETTE = ["#648FFF","#785EF0","#DC267F","#FE6100","#FFB000","#2EC4B6","#E71D36","#011627","#8AC926","#6A4C93"];

const TIME_UNITS = [
  { key: "ms",  label: "milliseconds" },
  { key: "s",   label: "seconds" },
  { key: "min", label: "minutes" },
  { key: "h",   label: "hours" },
  { key: "d",   label: "days" },
  { key: "w",   label: "weeks" },
  { key: "mo",  label: "months" },
  { key: "yr",  label: "years" },
];

// Conversion factors TO seconds (canonical base)
const TO_SECONDS = { ms: 0.001, s: 1, min: 60, h: 3600, d: 86400, w: 604800, mo: 2629800, yr: 31557600 };
function convertTime(value, fromUnit, toUnit) {
  if (fromUnit === toUnit) return value;
  return value * TO_SECONDS[fromUnit] / TO_SECONDS[toUnit];
}

// ── Parsing ──

function parseCSV(text, sepOv="") {
  const sep = autoDetectSep(text, sepOv);
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { headers: [], data: [] };
  const headers = lines[0].split(sep).map(h => h.trim().replace(/^"|"$/g, ""));
  const data = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = lines[i].split(sep).map(v => {
      const s = v.trim().replace(/^"|"$/g, "");
      const n = Number(s);
      return s === "" || isNaN(n) ? null : n;
    });
    if (vals.length === headers.length) data.push(vals);
  }
  return { headers, data };
}

// ── Condition detection & stats ──

function detectConditions(headers) {
  const pm = {};
  headers.forEach((h, i) => { if (!pm[h]) pm[h] = []; pm[h].push(i); });
  return Object.entries(pm).map(([name, colIndices], i) => ({
    prefix: name, label: name, color: PALETTE[i % PALETTE.length], colIndices,
  }));
}

function computeStats(data, headers, conditions) {
  const nRows = data.length;
  return conditions.map(cond => {
    const idxs = cond.colIndices;
    const means = [], sds = [];
    for (let r = 0; r < nRows; r++) {
      const vals = idxs.map(i => data[r][i]).filter(v => v != null);
      if (vals.length === 0) { means.push(null); sds.push(null); continue; }
      const m = vals.reduce((a, b) => a + b, 0) / vals.length;
      means.push(m);
      sds.push(vals.length < 2 ? 0 : Math.sqrt(vals.reduce((a, v) => a + (v - m) ** 2, 0) / (vals.length - 1)));
    }
    return { ...cond, means, sds };
  });
}

function smooth(arr, w) {
  if (w <= 0) return arr;
  return arr.map((_, i) => {
    let sum = 0, n = 0;
    for (let j = Math.max(0, i - w); j <= Math.min(arr.length - 1, i + w); j++) {
      if (arr[j] != null) { sum += arr[j]; n++; }
    }
    return n > 0 ? sum / n : null;
  });
}

// ── SVG helpers ──

function buildAreaD(pts) {
  const valid = pts.filter(p => p.yHi != null && p.yLo != null);
  if (valid.length < 2) return "";
  const fwd = valid.map(p => `${p.x.toFixed(2)},${p.yHi.toFixed(2)}`);
  const rev = valid.slice().reverse().map(p => `${p.x.toFixed(2)},${p.yLo.toFixed(2)}`);
  return "M" + fwd.join("L") + "L" + rev.join("L") + "Z";
}

function buildLineD(pts) {
  const valid = pts.filter(p => p.y != null);
  if (valid.length < 2) return "";
  return "M" + valid.map(p => `${p.x.toFixed(2)},${p.y.toFixed(2)}`).join("L");
}

function fmtTick(t) {
  if (t === 0) return "0";
  const abs = Math.abs(t);
  if (abs >= 10000 || (abs < 0.01 && abs > 0)) return t.toExponential(1);
  if (abs >= 100) return t.toFixed(0);
  return parseFloat(t.toPrecision(4)).toString();
}

// ── Chart component ──

const MARGIN = { top: 20, right: 20, bottom: 48, left: 62 };

const Chart = forwardRef(function Chart({ series, xStart, xEnd, yMin, yMax, vbW, vbH, xLabel, yLabel,
                 plotBg, showGrid, lineWidth, ribbonOpacity, gridColor, svgLegend, plotTitle, plotSubtitle }, ref) {
  const legendH = (() => { const blocks=svgLegend||[]; if(!blocks.length)return 0; const IW=88,IH=18,TH=15; let t=10; blocks.forEach((b,bi)=>{if(b.title)t+=TH;if(b.items)t+=Math.ceil(b.items.length/Math.max(1,Math.floor((vbW-MARGIN.left-MARGIN.right)/IW)))*IH;if(b.gradient)t+=30;if(bi<blocks.length-1)t+=8;}); return t+6; })();
  const topPad = (plotTitle ? 20 : 0) + (plotSubtitle ? 16 : 0);
  const w = vbW - MARGIN.left - MARGIN.right;
  const h = vbH - MARGIN.top - MARGIN.bottom;
  const xRange = xEnd - xStart || 1;
  const yRange = yMax - yMin || 1;
  const sx = v => MARGIN.left + ((v - xStart) / xRange) * w;
  const sy = v => MARGIN.top + (1 - (v - yMin) / yRange) * h;
  const clamp = v => Math.max(yMin, Math.min(yMax, v));
  const xTicks = makeTicks(xStart, xEnd, 8);
  const yTicks = makeTicks(yMin, yMax, 6);

  const paths = series.map(s => {
    const areaPts = s.rows.map(r => ({
      x: sx(r.t), yHi: (r.mean != null && r.sd != null) ? sy(clamp(r.mean + r.sd)) : null,
      yLo: (r.mean != null && r.sd != null) ? sy(clamp(r.mean - r.sd)) : null,
    }));
    const linePts = s.rows.map(r => ({ x: sx(r.t), y: r.mean != null ? sy(r.mean) : null }));
    return { prefix: s.prefix, color: s.color, areaD: buildAreaD(areaPts), lineD: buildLineD(linePts) };
  });

  return (
    <svg ref={ref} viewBox={`0 0 ${vbW} ${vbH + legendH + topPad}`} style={{ width: "100%", height: "auto", display: "block" }} xmlns="http://www.w3.org/2000/svg">
      {plotTitle && <text x={MARGIN.left + w / 2} y={17} textAnchor="middle" fontSize="13" fontWeight="700" fill="#222" fontFamily="sans-serif">{plotTitle}</text>}
      {plotSubtitle && <text x={MARGIN.left + w / 2} y={plotTitle ? 34 : 17} textAnchor="middle" fontSize="11" fill="#888" fontFamily="sans-serif">{plotSubtitle}</text>}
      <g transform={`translate(0, ${topPad})`}>
      <rect x={MARGIN.left} y={MARGIN.top} width={w} height={h} fill={plotBg || "#fff"} />
      {showGrid && yTicks.map(t => <line key={t} x1={MARGIN.left} x2={MARGIN.left + w} y1={sy(t)} y2={sy(t)} stroke={gridColor || "#e0e0e0"} strokeWidth="0.5" />)}
      {showGrid && xTicks.map(t => <line key={t} x1={sx(t)} x2={sx(t)} y1={MARGIN.top} y2={MARGIN.top + h} stroke={gridColor || "#e0e0e0"} strokeWidth="0.5" />)}
      {paths.map(p => p.areaD ? <path key={`area-${p.prefix}`} d={p.areaD} fill={p.color} fillOpacity={ribbonOpacity} stroke={p.color} strokeOpacity={ribbonOpacity} strokeWidth="0.5" /> : null)}
      {paths.map(p => p.lineD ? <path key={`line-${p.prefix}`} d={p.lineD} fill="none" stroke={p.color} strokeWidth={lineWidth} /> : null)}
      <rect x={MARGIN.left} y={MARGIN.top} width={w} height={h} fill="none" stroke="#333" strokeWidth="1" />
      {xTicks.map(t => <g key={t}><line x1={sx(t)} x2={sx(t)} y1={MARGIN.top + h} y2={MARGIN.top + h + 5} stroke="#333" strokeWidth="1" /><text x={sx(t)} y={MARGIN.top + h + 18} textAnchor="middle" fontSize="11" fill="#555" fontFamily="sans-serif">{fmtTick(t)}</text></g>)}
      {yTicks.map(t => <g key={t}><line x1={MARGIN.left - 5} x2={MARGIN.left} y1={sy(t)} y2={sy(t)} stroke="#333" strokeWidth="1" /><text x={MARGIN.left - 8} y={sy(t) + 4} textAnchor="end" fontSize="11" fill="#555" fontFamily="sans-serif">{fmtTick(t)}</text></g>)}
      {xLabel && <text x={MARGIN.left + w / 2} y={vbH - 4} textAnchor="middle" fontSize="13" fill="#444" fontFamily="sans-serif">{xLabel}</text>}
      {yLabel && <text transform={`translate(14,${MARGIN.top + h / 2}) rotate(-90)`} textAnchor="middle" fontSize="13" fill="#444" fontFamily="sans-serif">{yLabel}</text>}
      {svgLegend && svgLegend.length > 0 && (() => {
        const ITEM_W = 88, ITEM_H = 18, TITLE_H = 15;
        const leftX = MARGIN.left;
        const usableW = vbW - leftX - MARGIN.right;
        return svgLegend.map((block, bi) => {
          const blockY = vbH + 10 + (bi > 0 ? svgLegend.slice(0, bi).reduce((acc, b) => {
            if (b.title) acc += TITLE_H;
            if (b.items) acc += Math.ceil(b.items.length / Math.max(1, Math.floor(usableW / ITEM_W))) * ITEM_H;
            if (b.gradient) acc += 30;
            acc += 8;
            return acc;
          }, 0) : 0);
          const itemsPerRow = Math.max(1, Math.floor(usableW / ITEM_W));
          return (
            <g key={bi} transform={`translate(${leftX}, ${blockY})`}>
              {block.title && <text fontSize="10" fill="#666" fontFamily="sans-serif" y={10}>{block.title}</text>}
              {block.items && block.items.map((item, ii) => {
                const row = Math.floor(ii / itemsPerRow);
                const col = ii % itemsPerRow;
                return (
                  <g key={ii} transform={`translate(${col * ITEM_W}, ${(block.title ? TITLE_H : 0) + row * ITEM_H})`}>
                    {item.shape === "line"
                      ? <line x1={0} x2={14} y1={7} y2={7} stroke={item.color} strokeWidth="2.5" />
                      : <circle cx={6} cy={7} r={5} fill={item.color} />}
                    <text x={item.shape === "line" ? 18 : 14} y={11} fontSize="10" fill="#444" fontFamily="sans-serif">{item.label}</text>
                  </g>
                );
              })}
              {block.gradient && (() => {
                const gw = Math.min(usableW * 0.6, 200), gh = 12;
                const th = block.title ? TITLE_H : 0;
                const gradId = `svggrad-${bi}`;
                return (
                  <g transform={`translate(0, ${th})`}>
                    <defs><linearGradient id={gradId} x1="0%" y1="0%" x2="100%" y2="0%">
                      {block.gradient.stops.map((c, si) => <stop key={si} offset={`${si/(block.gradient.stops.length-1)*100}%`} stopColor={c} />)}
                    </linearGradient></defs>
                    <rect x={0} y={0} width={gw} height={gh} fill={`url(#${gradId})`} rx="2" />
                    <text x={0} y={gh+13} fontSize="9" fill="#555" fontFamily="sans-serif" textAnchor="start">{block.gradient.min}</text>
                    <text x={gw} y={gh+13} fontSize="9" fill="#555" fontFamily="sans-serif" textAnchor="end">{block.gradient.max}</text>
                  </g>
                );
              })()}
            </g>
          );
        });
      })()}
      </g>
    </svg>
  );
});

// ── Inset Barplot ──

const InsetBarplot = forwardRef(function InsetBarplot({ series, insetColors, insetStrokeColors, insetFillOpacity, insetStrokeOpacity,
  insetYMin, insetYMax, insetW, insetH, insetErrorType, insetBarStrokeWidth, insetShowGrid, insetGridColor, insetErrorStrokeWidth,
  insetXFontSize, insetYFontSize, insetXLabelAngle, plotBg, insetYLabel }, ref) {
  const iW = insetW || 200, iH = insetH || 150;
  const xAngle = insetXLabelAngle || 0;
  const absAngle = Math.abs(xAngle);
  const M = { top: 12, right: 8, bottom: 20 + (absAngle > 0 ? absAngle * 0.6 + 10 : 12), left: 46 };
  const w = iW - M.left - M.right, h = iH - M.top - M.bottom;

  const bars = series.map(s => {
    const validRows = s.rows.filter(r => r.mean != null);
    const sum = validRows.reduce((acc, r) => acc + r.mean, 0);
    const n = validRows.length;
    const mean = n > 0 ? sum / n : 0;
    const variance = n > 1 ? validRows.reduce((acc, r) => acc + (r.mean - mean) ** 2, 0) / (n - 1) : 0;
    const sd = Math.sqrt(variance);
    const sem = n > 1 ? sd / Math.sqrt(n) : 0;
    return { label: s.label, prefix: s.prefix, fillColor: insetColors[s.prefix] || s.color, strokeColor: insetStrokeColors[s.prefix] || s.color, sum, ptSd: sd, ptSem: sem, ptMean: mean, ptN: n };
  });

  const errBars = bars.map(b => {
    if (insetErrorType === "sd") return b.ptSd * b.ptN;
    if (insetErrorType === "sem") return b.ptSem * b.ptN;
    return 0;
  });

  const dataMax = Math.max(...bars.map((b, i) => b.sum + (errBars[i] || 0)), 0.001);
  const yMin2 = insetYMin != null ? insetYMin : 0;
  const yMax2 = insetYMax != null ? insetYMax : dataMax * 1.1;
  const yRange = yMax2 - yMin2 || 1;
  const bandW = w / bars.length;
  const bx = i => M.left + i * bandW + bandW / 2;
  const sy = v => M.top + (1 - (v - yMin2) / yRange) * h;
  const yTicks = makeTicks(yMin2, yMax2, 4);
  const halfBar = bandW * 0.35;
  const fOp = insetFillOpacity != null ? insetFillOpacity : 0.7;
  const sOp = insetStrokeOpacity != null ? insetStrokeOpacity : 1;

  return (
    <svg ref={ref} viewBox={`0 0 ${iW} ${iH}`} style={{ width: "100%", height: "100%", display: "block" }} xmlns="http://www.w3.org/2000/svg">
      <rect x={M.left} y={M.top} width={w} height={h} fill={plotBg || "#fff"} />
      {insetShowGrid && yTicks.map(t => <line key={t} x1={M.left} x2={M.left + w} y1={sy(t)} y2={sy(t)} stroke={insetGridColor || "#e0e0e0"} strokeWidth="0.4" />)}
      {yTicks.map(t => <g key={t}><line x1={M.left - 3} x2={M.left} y1={sy(t)} y2={sy(t)} stroke="#333" strokeWidth="0.5" /><text x={M.left - 5} y={sy(t) + 3} textAnchor="end" fontSize={insetYFontSize || 7} fill="#555" fontFamily="sans-serif">{t % 1 === 0 ? t : t.toFixed(1)}</text></g>)}
      {bars.map((b, i) => {
        const barTop = sy(Math.min(b.sum, yMax2));
        const baseline = sy(Math.max(0, yMin2));
        const errVal = errBars[i] || 0;
        const capW = halfBar * 0.4;
        return (
          <g key={b.prefix}>
            <rect x={bx(i) - halfBar} y={barTop} width={halfBar * 2} height={Math.max(0, baseline - barTop)} fill={b.fillColor} fillOpacity={fOp} stroke={b.strokeColor} strokeOpacity={sOp} strokeWidth={insetBarStrokeWidth} rx="1" />
            {insetErrorType !== "none" && errVal > 0 && <>
              <line x1={bx(i)} x2={bx(i)} y1={sy(b.sum + errVal)} y2={sy(b.sum - errVal)} stroke="#333" strokeWidth={insetErrorStrokeWidth} />
              <line x1={bx(i) - capW} x2={bx(i) + capW} y1={sy(b.sum + errVal)} y2={sy(b.sum + errVal)} stroke="#333" strokeWidth={insetErrorStrokeWidth} />
              <line x1={bx(i) - capW} x2={bx(i) + capW} y1={sy(b.sum - errVal)} y2={sy(b.sum - errVal)} stroke="#333" strokeWidth={insetErrorStrokeWidth} />
            </>}
            {absAngle === 0
              ? <text x={bx(i)} y={M.top + h + 12} textAnchor="middle" fontSize={insetXFontSize || 7} fill="#333" fontFamily="sans-serif" fontWeight="600">{b.label}</text>
              : <text x={bx(i)} y={M.top + h + 10} transform={`rotate(${xAngle}, ${bx(i)}, ${M.top + h + 10})`} textAnchor="end" dominantBaseline="middle" fontSize={insetXFontSize || 7} fill="#333" fontFamily="sans-serif" fontWeight="600">{b.label}</text>}
          </g>
        );
      })}
      <rect x={M.left} y={M.top} width={w} height={h} fill="none" stroke="#333" strokeWidth="0.5" />
      <text transform={`translate(8,${M.top + h / 2}) rotate(-90)`} textAnchor="middle" fontSize={insetYFontSize || 7} fill="#444" fontFamily="sans-serif">{insetYLabel || "\u03A3 Y"}</text>
    </svg>
  );
});

// ── Style constants ──────────────────────────────────────────────────────────

const inp = { width: 72, background: "#fff", border: "1px solid #ccc", borderRadius: 4, color: "#333", padding: "4px 8px", fontSize: 13, textAlign: "center" };
const lbl = { fontSize: 12, color: "#777", marginBottom: 2 };
const sec = { background: "#f8f8fa", borderRadius: 10, padding: 16, marginBottom: 16, border: "1px solid #ddd" };
const dlBtn = { padding: "4px 10px", borderRadius: 5, fontSize: 11, cursor: "pointer",
  background: "#fff", border: "1px solid #ccc", color: "#555", fontFamily: "inherit", marginTop: 4, display: "inline-block" };

// ── PlotPanel ──

const PlotPanel = React.forwardRef(function PlotPanel({ stats, xStart, xEnd, yMin, yMax, faceted, title, subtitle, smoothWidth,
                     plotBg, showGrid, lineWidth, ribbonOpacity, gridColor, xLabel, yLabel, baseUnit, displayUnit, timeStep,
                     showInset, insetColors, insetStrokeColors, insetFillOpacity, insetStrokeOpacity,
                     insetYMin, insetYMax, insetW, insetH, insetErrorType,
                     insetBarStrokeWidth, insetShowGrid, insetGridColor, insetErrorStrokeWidth,
                     insetXFontSize, insetYFontSize, insetXLabelAngle, insetYLabel }, ref) {
  const activeStats = stats.filter(s => s.enabled);
  const combinedRef = useRef();
  const facetRefs = useRef({});
  if (activeStats.length === 0) return <p style={{ color: "#777" }}>No conditions selected.</p>;

  // Build series with time values in baseUnit
  const series = useMemo(() => {
    return activeStats.map(cond => {
      const sm = smooth(cond.means, smoothWidth);
      const ssd = smooth(cond.sds, smoothWidth);
      const rows = [];
      const ts = timeStep || 1;
      for (let r = 0; r < cond.means.length; r++) {
        const t = r * ts;
        if (t < xStart || t > xEnd) continue;
        rows.push({ t, mean: sm[r], sd: ssd[r] });
      }
      return { prefix: cond.prefix, label: cond.label, color: cond.color, n: cond.colIndices.length, rows };
    });
  }, [activeStats.length, activeStats.map(s => s.prefix + s.color + s.enabled).join(","), xStart, xEnd, smoothWidth, timeStep]);

  // Convert to display unit
  const convFactor = convertTime(1, baseUnit, displayUnit);
  const displaySeries = useMemo(() => {
    if (convFactor === 1) return series;
    return series.map(s => ({ ...s, rows: s.rows.map(r => ({ ...r, t: r.t * convFactor })) }));
  }, [series, convFactor]);

  const dispXStart = xStart * convFactor;
  const dispXEnd = xEnd * convFactor;
  const xLabelText = xLabel || `Time (${displayUnit})`;

  const insetBarRef = useRef();

  React.useImperativeHandle(ref, () => ({
    downloadMain: () => {
      if (faceted) {
        displaySeries.forEach(s => downloadSvg(facetRefs.current[s.prefix], `${s.label}.svg`));
      } else {
        downloadSvg(combinedRef.current, "line_plot.svg");
      }
      if (showInset) downloadSvg(insetBarRef.current, "barplot_sum.svg");
    },
  }), [faceted, displaySeries, showInset]);

  if (faceted) {
    const nCols = Math.min(displaySeries.length + (showInset ? 1 : 0), 3);
    return (
      <div style={{ display: "grid", gridTemplateColumns: `repeat(${nCols}, 1fr)`, gap: 16, alignItems: "stretch" }}>
        {displaySeries.map(s => (
          <div key={s.prefix} style={{ background: "#fafafa", borderRadius: 8, padding: 12, border: "1px solid #ddd" }}>
            <p style={{ margin: "0 0 4px", fontSize: 13, fontWeight: 600, color: s.color }}>
              {s.label} <span style={{ fontSize: 11, fontWeight: 400, color: "#999" }}>n={s.n}</span>
            </p>
            <Chart ref={el => { facetRefs.current[s.prefix] = el; }}
              series={[s]} xStart={dispXStart} xEnd={dispXEnd} yMin={yMin} yMax={yMax}
              vbW={400} vbH={260} xLabel={xLabelText} yLabel={yLabel}
              plotBg={plotBg} showGrid={showGrid} lineWidth={lineWidth} ribbonOpacity={ribbonOpacity} gridColor={gridColor}
              plotTitle={title ? `${title} — ${s.label}` : s.label} plotSubtitle={subtitle || null} svgLegend={null} />
          </div>
        ))}
        {showInset && (
          <div style={{ background: "#fafafa", borderRadius: 8, padding: 12, border: "1px solid #ddd", display: "flex", flexDirection: "column" }}>
            <p style={{ margin: "0 0 4px", fontSize: 13, fontWeight: 600, color: "#555" }}>
              {"\u03A3"} Y <span style={{ fontSize: 11, fontWeight: 400, color: "#999" }}>sum of plotted values</span>
            </p>
            <div style={{ flex: 1, minHeight: 0 }}>
              <InsetBarplot ref={insetBarRef} series={series} insetColors={insetColors} insetStrokeColors={insetStrokeColors}
                insetFillOpacity={insetFillOpacity} insetStrokeOpacity={insetStrokeOpacity}
                insetYMin={insetYMin} insetYMax={insetYMax} insetW={insetW} insetH={insetH}
                insetErrorType={insetErrorType} insetBarStrokeWidth={insetBarStrokeWidth}
                insetShowGrid={insetShowGrid} insetGridColor={insetGridColor} insetErrorStrokeWidth={insetErrorStrokeWidth}
                insetXFontSize={insetXFontSize} insetYFontSize={insetYFontSize} insetXLabelAngle={insetXLabelAngle}
                plotBg={plotBg} insetYLabel={insetYLabel} />
            </div>
          </div>
        )}
      </div>
    );
  }

  return (
    <div>
      {(title || subtitle) && (
        <div style={{ textAlign: "center", marginBottom: 8 }}>
          {title && <h3 style={{ margin: 0, fontSize: 17, fontWeight: 700, color: "#222" }}>{title}</h3>}
          {subtitle && <p style={{ margin: 0, fontSize: 13, color: "#888" }}>{subtitle}</p>}
        </div>
      )}
      <div style={{ display: "flex", gap: 16, alignItems: "stretch" }}>
        <div style={{ flex: 1, minWidth: 0, background: "#fafafa", borderRadius: 8, padding: 12, border: "1px solid #ddd" }}>
          <Chart ref={combinedRef} series={displaySeries} xStart={dispXStart} xEnd={dispXEnd} yMin={yMin} yMax={yMax}
            vbW={800} vbH={420} xLabel={xLabelText} yLabel={yLabel}
            plotBg={plotBg} showGrid={showGrid} lineWidth={lineWidth} ribbonOpacity={ribbonOpacity} gridColor={gridColor}
            plotTitle={title || null} plotSubtitle={subtitle || null}
            svgLegend={[{
              title: null,

// ── UI components ──

function ConditionEditor({ conditions, onChange }) {
  const update = (i, key, val) => onChange(conditions.map((c, j) => j === i ? { ...c, [key]: val } : c));
  const toggle = i => onChange(conditions.map((c, j) => j === i ? { ...c, enabled: !c.enabled } : c));
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
      {conditions.map((c, i) => (
        <div key={c.prefix} style={{ display: "flex", alignItems: "center", gap: 5, padding: "4px 8px", borderRadius: 6, fontSize: 12,
          background: c.enabled ? "#f0f0f5" : "#fafafa", opacity: c.enabled ? 1 : 0.4, border: "1px solid #ccc" }}>
          <input type="checkbox" checked={c.enabled} onChange={() => toggle(i)} style={{ accentColor: c.color, flexShrink: 0 }} />
          <ColorInput value={c.color} onChange={v => update(i, "color", v)} size={20}/>
          <input value={c.label} onChange={e => update(i, "label", e.target.value)}
            style={{ flex: 1, minWidth: 0, background: "#fff", border: "1px solid #ccc", borderRadius: 4, color: "#333", padding: "2px 5px", fontSize: 12, fontFamily: "inherit" }} />
          <span style={{ color: "#999", fontSize: 10, flexShrink: 0 }}>({c.colIndices.length})</span>
        </div>
      ))}
    </div>
  );
}

  const xAxisLabel = `Time (${displayUnit})`;

  // Auto Y range from data
  const autoYRange = useMemo(() => {
    if (!parsed || stats.length === 0) return [0, 1];
    // Pair each mean with its own SD before filtering — avoids index misalignment
    // when means and SDs have nulls at different positions.
    const pairs = stats.flatMap(s => s.means.map((mean, i) => ({ mean, sd: s.sds[i] ?? null })))
                       .filter(p => p.mean != null);
    if (pairs.length === 0) return [0, 1];
    const lo = Math.min(...pairs.map(p => p.mean - (p.sd ?? 0)));
    const hi = Math.max(...pairs.map(p => p.mean + (p.sd ?? 0)));
    const pad = (hi - lo) * 0.08 || 0.5;
    return [lo - pad, hi + pad];
  }, [parsed, stats]);

  const plotPanelRef = useRef();

    if (!headers.length || !data.length) { setParseError("The file appears to be empty or has no data rows. Please check your file and try again."); return; }
    setParseError(null);
    const detectedConds = detectConditions(headers).map(c => ({ ...c, enabled: true }));
    setConditions(detectedConds);
    const ic = {}, isc = {};
    detectedConds.forEach(c => { ic[c.prefix] = c.color; isc[c.prefix] = c.color; });
    setInsetColors(ic); setInsetStrokeColors(isc);
    setXStart(0); setXEnd(data.length - 1);
    // Auto Y
    const allVals = detectedConds.flatMap(c => c.colIndices.flatMap(ci => data.map(r => r[ci]).filter(v => v != null)));
    if (allVals.length > 0) {
      const pad = (Math.max(...allVals) - Math.min(...allVals)) * 0.08 || 0.5;

                    <span style={{fontSize:10,color:"#999"}}>{ribbonOpacity.toFixed(2)}</span>
                  </div>
                  <input type="range" min="0" max="1" step="0.05" value={ribbonOpacity} onChange={e => setRibbonOpacity(Number(e.target.value))} style={{width:"100%",accentColor:"#648FFF"}}/>
                </div>
              </div>
            </div>

            {/* Plot parameters */}
            <div style={sec}>
              <p style={{ margin: "0 0 8px", fontSize: 12, fontWeight: 600, color: "#555" }}>Plot parameters</p>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <div>
                  <div style={lbl}>Display unit</div>
                  <select value={displayUnit} onChange={e => setDisplayUnit(e.target.value)}
                    style={{ width:"100%", background: "#fff", border: "1px solid #ccc", borderRadius: 4, padding: "4px 8px", fontSize: 12, fontFamily: "inherit", color: "#333", cursor: "pointer" }}>
                    {TIME_UNITS.map(u => <option key={u.key} value={u.key}>{u.label} ({u.key})</option>)}
                  </select>
                </div>
                <div><div style={lbl}>X start ({displayUnit})</div><input type="number" value={parseFloat((xStartBase * dispFactor).toPrecision(6))} onChange={e => setXStart(Number(e.target.value) / dispFactor / timeStep)} style={{...inp, width:"100%"}} step="any" /></div>
                <div><div style={lbl}>X end ({displayUnit})</div><input type="number" value={parseFloat((xEndBase * dispFactor).toPrecision(6))} onChange={e => setXEnd(Number(e.target.value) / dispFactor / timeStep)} style={{...inp, width:"100%"}} step="any" /></div>
                <div><div style={lbl}>Y min</div><input type="number" value={yMin} onChange={e => setYMin(Number(e.target.value))} style={{...inp, width:"100%"}} step="any" /></div>
                <div><div style={lbl}>Y max</div><input type="number" value={yMax} onChange={e => setYMax(Number(e.target.value))} style={{...inp, width:"100%"}} step="any" /></div>
                <div><div style={lbl}>Smooth ({"\u00B1"}pts)</div><input type="number" value={smoothWidth} onChange={e => setSmoothWidth(Number(e.target.value))} style={{...inp, width:"100%"}} min="0" max="50" /></div>
                <div><div style={lbl}>Title</div><input value={plotTitle} onChange={e => setPlotTitle(e.target.value)} style={{ ...inp, width:"100%", textAlign: "left" }} /></div>
                <div><div style={lbl}>Subtitle</div><input value={plotSubtitle} onChange={e => setPlotSubtitle(e.target.value)} style={{ ...inp, width:"100%", textAlign: "left" }} /></div>
                <div><div style={lbl}>Y label</div><input value={yLabel} onChange={e => setYLabel(e.target.value)} style={{ ...inp, width:"100%", textAlign: "left" }} /></div>
              </div>
            </div>

            {/* Barplot inset controls */}
            <div style={sec}>
              <p style={{ margin: "0 0 8px", fontSize: 12, fontWeight: 600, color: "#555" }}>Barplot ({"\u03A3"} of plotted values)</p>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
                <span style={lbl}>Show</span>
                <input type="checkbox" checked={showInset} onChange={e => setShowInset(e.target.checked)} style={{ accentColor: "#648FFF" }} />
              </div>
              {showInset && <>
                <p style={{ margin: "0 0 6px", fontSize: 10, fontWeight: 600, color: "#999", textTransform: "uppercase", letterSpacing: 1 }}>Layout</p>
                <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 10 }}>
                  <div><div style={lbl}>Width</div><input type="number" value={insetW} onChange={e => setInsetW(Number(e.target.value))} style={{...inp, width:"100%"}} min="100" max="500" step="10" /></div>
                  <div><div style={lbl}>Height</div><input type="number" value={insetH} onChange={e => setInsetH(Number(e.target.value))} style={{...inp, width:"100%"}} min="80" max="400" step="10" /></div>
                  <div><div style={lbl}>Y min</div><input value={insetYMinCustom} onChange={e => setInsetYMinCustom(e.target.value)} style={{...inp, width:"100%"}} placeholder="auto" /></div>
                  <div><div style={lbl}>Y max</div><input value={insetYMaxCustom} onChange={e => setInsetYMaxCustom(e.target.value)} style={{...inp, width:"100%"}} placeholder="auto" /></div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={lbl}>Grid</span>
                    <input type="checkbox" checked={insetShowGrid} onChange={e => setInsetShowGrid(e.target.checked)} style={{ accentColor: "#648FFF" }} />
                  </div>
                  {insetShowGrid && (
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <span style={lbl}>Grid color</span>
                      <ColorInput value={insetGridColor} onChange={setInsetGridColor} size={18} />
                    </div>
                  )}
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                      <span style={lbl}>X label angle</span>
                      <span style={{fontSize:10,color:"#999"}}>{insetXLabelAngle}{"\u00B0"}</span>
                    </div>
                    <input type="range" min="-90" max="0" step="5" value={insetXLabelAngle} onChange={e => setInsetXLabelAngle(Number(e.target.value))} style={{width:"100%",accentColor:"#648FFF"}}/>
                  </div>
                </div>
                <p style={{ margin: "0 0 6px", fontSize: 10, fontWeight: 600, color: "#999", textTransform: "uppercase", letterSpacing: 1 }}>Bars</p>
                <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 10 }}>
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                      <span style={lbl}>Fill opacity</span>
                      <span style={{fontSize:10,color:"#999"}}>{insetFillOpacity.toFixed(2)}</span>
                    </div>
                    <input type="range" min="0" max="1" step="0.05" value={insetFillOpacity} onChange={e => setInsetFillOpacity(Number(e.target.value))} style={{width:"100%",accentColor:"#648FFF"}}/>
                  </div>
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                      <span style={lbl}>Stroke opacity</span>
                      <span style={{fontSize:10,color:"#999"}}>{insetStrokeOpacity.toFixed(2)}</span>
                    </div>
                    <input type="range" min="0" max="1" step="0.05" value={insetStrokeOpacity} onChange={e => setInsetStrokeOpacity(Number(e.target.value))} style={{width:"100%",accentColor:"#648FFF"}}/>
                  </div>
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                      <span style={lbl}>Stroke width</span>
                      <span style={{fontSize:10,color:"#999"}}>{insetBarStrokeWidth}</span>
                    </div>
                    <input type="range" min="0" max="4" step="0.25" value={insetBarStrokeWidth} onChange={e => setInsetBarStrokeWidth(Number(e.target.value))} style={{width:"100%",accentColor:"#648FFF"}}/>
                  </div>
                </div>
                <p style={{ margin: "0 0 6px", fontSize: 10, fontWeight: 600, color: "#999", textTransform: "uppercase", letterSpacing: 1 }}>Error bars</p>
                <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 10 }}>
                  <div>
                    <div style={lbl}>Type</div>
                    <select value={insetErrorType} onChange={e => setInsetErrorType(e.target.value)} style={{ width:"100%", background: "#fff", border: "1px solid #ccc", borderRadius: 4, padding: "4px 8px", fontSize: 12, fontFamily: "inherit", color: "#333", cursor: "pointer" }}>
                      <option value="none">None</option>
                      <option value="sem">SEM</option>
                      <option value="sd">SD</option>
                    </select>
                  </div>
                  {insetErrorType !== "none" && (
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                        <span style={lbl}>Error stroke</span>
                        <span style={{fontSize:10,color:"#999"}}>{insetErrorStrokeWidth}</span>
                      </div>
                      <input type="range" min="0.2" max="3" step="0.1" value={insetErrorStrokeWidth} onChange={e => setInsetErrorStrokeWidth(Number(e.target.value))} style={{width:"100%",accentColor:"#648FFF"}}/>
                    </div>
                  )}
                </div>
                <p style={{ margin: "0 0 6px", fontSize: 10, fontWeight: 600, color: "#999", textTransform: "uppercase", letterSpacing: 1 }}>Condition colors</p>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {stats.filter(s => s.enabled).map(s => (
                    <div key={s.prefix} style={{ display: "flex", flexDirection: "column", gap: 4, padding: "6px 8px", background: "#f0f0f5", borderRadius: 5, border: "1px solid #ddd" }}>
                      <span style={{ fontSize: 11, color: "#555", fontWeight: 600 }}>{s.label}</span>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontSize: 10, color: "#999", width: 24 }}>fill</span>
                        <ColorInput value={insetColors[s.prefix] || s.color} onChange={v => setInsetColors(prev => ({ ...prev, [s.prefix]: v }))} size={18} />
                        <span style={{ fontSize: 10, color: "#999", width: 24 }}>line</span>
                        <ColorInput value={insetStrokeColors[s.prefix] || s.color} onChange={v => setInsetStrokeColors(prev => ({ ...prev, [s.prefix]: v }))} size={18} />
                      </div>
                    </div>
                  ))}
                </div>
              </>}
            </div>


          </div>
          {/* RIGHT: chart area */}
          <div style={{flex:1,minWidth:0}}>
            {stats.length > 0 ? (
              <div style={{ ...sec, padding: 20, background: "#fff" }}>
                <PlotPanel ref={plotPanelRef} stats={stats} xStart={xStartBase} xEnd={xEndBase} yMin={yMin} yMax={yMax} faceted={faceted}
                  title={plotTitle} subtitle={plotSubtitle} smoothWidth={smoothWidth} timeStep={timeStep}
                  plotBg={plotBg} showGrid={showGrid} lineWidth={lineWidth}
                  ribbonOpacity={ribbonOpacity} gridColor={gridColor} baseUnit={baseUnit} displayUnit={displayUnit} xLabel={xAxisLabel} yLabel={yLabel}
                  showInset={showInset} insetColors={insetColors} insetStrokeColors={insetStrokeColors}
                  insetFillOpacity={insetFillOpacity} insetStrokeOpacity={insetStrokeOpacity}
                  insetYMin={insetYMinCustom !== "" ? Number(insetYMinCustom) : null}
                  insetYMax={insetYMaxCustom !== "" ? Number(insetYMaxCustom) : null}
                  insetW={insetW} insetH={insetH} insetErrorType={insetErrorType}
                  insetBarStrokeWidth={insetBarStrokeWidth} insetShowGrid={insetShowGrid}
                  insetGridColor={insetGridColor} insetErrorStrokeWidth={insetErrorStrokeWidth}
                  insetXFontSize={insetXFontSize} insetYFontSize={insetYFontSize} insetXLabelAngle={insetXLabelAngle}
                  insetYLabel={`\u03A3 ${yLabel}`} />
              </div>
            ) : (
              <p style={{ color: "#777", fontSize: 13 }}>No data loaded yet.</p>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
