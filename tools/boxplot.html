<!DOCTYPE html>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<body>
  <div id="root"></div>
</div>
  <script type="text/babel">
const { useState, useMemo, useCallback, useRef, forwardRef } = React;
const PALETTE = ["#648FFF","#785EF0","#DC267F","#FE6100","#FFB000","#2EC4B6","#E71D36","#011627","#8AC926","#6A4C93"];

function detectHeader(rows){if(rows.length<2)return true;const a=rows[0].filter(v=>isNaN(Number(v))&&v.trim()!=="").length;const b=rows[1].filter(v=>isNaN(Number(v))&&v.trim()!=="").length;if(a>b)return true;if(a===b&&a>0){let reps=0;for(let i=1;i<Math.min(rows.length,20);i++)for(let c=0;c<rows[0].length;c++)if(rows[i][c]&&rows[i][c].trim()===rows[0][c].trim())reps++;return reps<rows[0].length;}return a>0;}
function parseRaw(text, sepOv=""){const sep=autoDetectSep(text, sepOv);const lines=text.trim().split(/\r?\n/).filter(l=>l.trim()!=="");if(lines.length<1)return{headers:[],rows:[],hasHeader:false};const all=lines.map(l=>l.split(sep).map(v=>v.trim().replace(/^"|"$/g,"")));const mx=Math.max(...all.map(r=>r.length));const pad=all.map(r=>{while(r.length<mx)r.push("");return r;});const hh=detectHeader(pad);if(hh)return{headers:pad[0],rows:pad.slice(1),hasHeader:true};return{headers:pad[0].map((_,i)=>`Col_${i+1}`),rows:pad,hasHeader:false};}
function guessColumnType(vals){const ne=vals.filter(v=>v!=="");if(ne.length===0)return"ignore";if(ne.filter(v=>!isNaN(Number(v))).length/ne.length>0.8)return"value";const u=new Set(ne);if(u.size<=20&&u.size<ne.length*0.5)return"group";return"text";}

function detectWideFormat(headers,rows){if(headers.length<2||rows.length<2)return false;const numericCols=headers.map((_,ci)=>{const vals=rows.map(r=>r[ci]).filter(v=>v!=="");return vals.length>0&&vals.filter(v=>!isNaN(Number(v))).length/vals.length>0.8;});return numericCols.every(Boolean);}
function wideToLong(headers,rows){const longRows=[];rows.forEach(r=>{headers.forEach((h,ci)=>{if(r[ci]!==""&&!isNaN(Number(r[ci])))longRows.push([h,r[ci]]);});});return{headers:["Group","Value"],rows:longRows};}

function quartiles(arr){const s=[...arr].sort((a,b)=>a-b),n=s.length;if(n===0)return null;const q=p=>{const i=p*(n-1),lo=Math.floor(i),hi=Math.ceil(i);return lo===hi?s[lo]:s[lo]*(hi-i)+s[hi]*(i-lo);};const q1=q(.25),med=q(.5),q3=q(.75),iqr=q3-q1;return{min:s[0],max:s[n-1],q1,med,q3,iqr,wLo:s.find(v=>v>=q1-1.5*iqr)??s[0],wHi:[...s].reverse().find(v=>v<=q3+1.5*iqr)??s[n-1],n};}
function computeGroupStats(groups){return Object.entries(groups).map(([name,vals])=>{const nums=vals.filter(v=>v!==""&&!isNaN(Number(v))).map(Number);const n=nums.length;if(n===0)return{name,n:0,mean:null,sd:null,sem:null,min:null,max:null,median:null};const mean=nums.reduce((a,b)=>a+b,0)/n;const vr=n>1?nums.reduce((s,v)=>s+(v-mean)**2,0)/(n-1):0;const sd=Math.sqrt(vr),sem=n>1?sd/Math.sqrt(n):0;const sorted=[...nums].sort((a,b)=>a-b);return{name,n,mean,sd,sem,min:sorted[0],max:sorted[n-1],median:n%2===0?(sorted[n/2-1]+sorted[n/2])/2:sorted[Math.floor(n/2)]};});}
function reshapeWide(rows,gi,vi){const g={};rows.forEach(r=>{const k=r[gi]||"?";if(!g[k])g[k]=[];g[k].push(r[vi]);});const mx=Math.max(...Object.values(g).map(v=>v.length));const names=Object.keys(g);const w=[];for(let i=0;i<mx;i++)w.push(names.map(n=>g[n][i]!=null?g[n][i]:""));return{headers:names,rows:w};}

const BoxplotChart=forwardRef(function BoxplotChart({groups,yLabel,plotTitle,plotBg,showGrid,gridColor,boxWidth,boxFillOpacity,pointSize,showPoints,jitterWidth,pointOpacity,xLabelAngle,yMin:yMinP,yMax:yMaxP,categoryColors:catCols,colorByCol:cbc,boxGap,svgLegend},ref){
  const angle=xLabelAngle||0,absA=Math.abs(angle),botM=60+(absA>0?absA*0.8:0);
  const M={top:24,right:24,bottom:botM,left:62};
  const allV=groups.flatMap(g=>g.allValues);if(allV.length===0)return null;
  const dMin=Math.min(...allV),dMax=Math.max(...allV),pad=(dMax-dMin)*0.08||1;
  const yMin=yMinP!=null?yMinP:dMin-pad,yMax=yMaxP!=null?yMaxP:dMax+pad;
  const n=groups.length,compact=(100-(boxGap!=null?boxGap:0))/100;
  const vbW=Math.max(200,n*100*compact+M.left+M.right);
  const vbH_chart=420+(absA>0?absA*0.8:0);
  const _legH=(()=>{const blocks=svgLegend||[];if(!blocks.length)return 0;const IW=88,IH=18,TH=15;let t=10;blocks.forEach((b,bi)=>{if(b.title)t+=TH;if(b.items)t+=Math.ceil(b.items.length/Math.max(1,Math.floor((vbW-M.left-M.right)/IW)))*IH;if(b.gradient)t+=30;if(bi<blocks.length-1)t+=8;});return t+6;})();
  const vbH=vbH_chart+_legH;
  const w=vbW-M.left-M.right,h=vbH_chart-M.top-M.bottom;
  const bandW=w/n,bx=i=>M.left+i*bandW+bandW/2,sy=v=>M.top+(1-(v-yMin)/((yMax-yMin)||1))*h;
  const yTicks=makeTicks(yMin,yMax,8),halfBox=(boxWidth/100)*bandW*0.4;
  return(
    <svg ref={ref} viewBox={`0 0 ${vbW} ${vbH}`} style={{width:vbW,maxWidth:"100%",height:"auto",display:"block"}} xmlns="http://www.w3.org/2000/svg">
      <rect x={M.left} y={M.top} width={w} height={h} fill={plotBg}/>
      {showGrid&&yTicks.map(t=><line key={t} x1={M.left} x2={M.left+w} y1={sy(t)} y2={sy(t)} stroke={gridColor} strokeWidth="0.5"/>)}
      {yTicks.map(t=><g key={t}><line x1={M.left-5} x2={M.left} y1={sy(t)} y2={sy(t)} stroke="#333" strokeWidth="1"/><text x={M.left-8} y={sy(t)+4} textAnchor="end" fontSize="11" fill="#555" fontFamily="sans-serif">{Math.abs(t)<.01&&t!==0?t.toExponential(1):(t%1===0?t:t.toFixed(2))}</text></g>)}
      {groups.map((g,gi)=>{if(!g.stats)return null;const cx=bx(gi),{q1,med,q3,wLo,wHi}=g.stats;return(
        <g key={g.name}>
          <line x1={cx} x2={cx} y1={sy(wHi)} y2={sy(q3)} stroke="#333" strokeWidth="1"/>
          <line x1={cx} x2={cx} y1={sy(q1)} y2={sy(wLo)} stroke="#333" strokeWidth="1"/>
          <line x1={cx-halfBox*.5} x2={cx+halfBox*.5} y1={sy(wHi)} y2={sy(wHi)} stroke="#333" strokeWidth="1"/>
          <line x1={cx-halfBox*.5} x2={cx+halfBox*.5} y1={sy(wLo)} y2={sy(wLo)} stroke="#333" strokeWidth="1"/>
          <rect x={cx-halfBox} y={sy(q3)} width={halfBox*2} height={sy(q1)-sy(q3)} fill={g.color} fillOpacity={boxFillOpacity} stroke={g.color} strokeWidth="1.5" rx="2"/>
          <line x1={cx-halfBox} x2={cx+halfBox} y1={sy(med)} y2={sy(med)} stroke={g.color} strokeWidth="2.5"/>
          {showPoints&&g.sources.map((src,si)=>{const rng=seededRandom(gi*1000+si*100+42);const ptColor=(cbc>=0&&catCols&&src.category)?catCols[src.category]||getPointColors(g.color,g.sources.length)[si]||g.color:getPointColors(g.color,g.sources.length)[si]||g.color;return src.values.map((v,vi)=>{const j=(rng()-.5)*jitterWidth*halfBox*2;return<circle key={`${g.name}-${si}-${vi}`} cx={cx+j} cy={sy(v)} r={pointSize} fill={ptColor} fillOpacity={pointOpacity||.6} stroke={ptColor} strokeOpacity={Math.min(1,(pointOpacity||.6)+.15)} strokeWidth="0.3"/>;});})}
        </g>);})}
      <rect x={M.left} y={M.top} width={w} height={h} fill="none" stroke="#333" strokeWidth="1"/>
      {groups.map((g,gi)=>{const lx=bx(gi),ly=M.top+h+16;return angle===0?(<g key={`xl-${g.name}`}><text x={lx} y={ly} textAnchor="middle" fontSize="11" fill="#333" fontFamily="sans-serif" fontWeight="600">{g.name}</text><text x={lx} y={ly+14} textAnchor="middle" fontSize="9" fill="#999" fontFamily="sans-serif">n={g.stats?.n||0}</text></g>):(<g key={`xl-${g.name}`} transform={`rotate(${angle},${lx},${ly})`}><text x={lx} y={ly} textAnchor="end" dominantBaseline="middle" fontSize="11" fill="#333" fontFamily="sans-serif" fontWeight="600">{g.name}</text><text x={lx} y={ly+12} textAnchor="end" dominantBaseline="middle" fontSize="9" fill="#999" fontFamily="sans-serif">n={g.stats?.n||0}</text></g>);})}
      {yLabel&&<text transform={`translate(14,${M.top+h/2}) rotate(-90)`} textAnchor="middle" fontSize="13" fill="#444" fontFamily="sans-serif">{yLabel}</text>}
      {plotTitle&&<text x={M.left+w/2} y={14} textAnchor="middle" fontSize="15" fontWeight="700" fill="#222" fontFamily="sans-serif">{plotTitle}</text>}
      {svgLegend && svgLegend.length > 0 && (() => {
        const ITEM_W = 88, ITEM_H = 18, TITLE_H = 15;
        const leftX = M.left;
        const usableW = vbW - leftX - M.right;
        return svgLegend.map((block, bi) => {
          const blockY = vbH_chart + 10 + (bi > 0 ? svgLegend.slice(0, bi).reduce((acc, b) => {
            if (b.title) acc += TITLE_H;
            if (b.items) acc += Math.ceil(b.items.length / Math.max(1, Math.floor(usableW / ITEM_W))) * ITEM_H;
            if (b.gradient) acc += 30;
            acc += 8;
            return acc;
          }, 0) : 0);
          const itemsPerRow = Math.max(1, Math.floor(usableW / ITEM_W));
          return (
            <g key={bi} transform={`translate(${leftX}, ${blockY})`}>
              {block.title && <text fontSize="10" fill="#666" fontFamily="sans-serif" y={10}>{block.title}</text>}
              {block.items && block.items.map((item, ii) => {
                const row = Math.floor(ii / itemsPerRow);
                const col = ii % itemsPerRow;
                return (
                  <g key={ii} transform={`translate(${col * ITEM_W}, ${(block.title ? TITLE_H : 0) + row * ITEM_H})`}>
                    {item.shape === "line"
                      ? <line x1={0} x2={14} y1={7} y2={7} stroke={item.color} strokeWidth="2.5" />
                      : <circle cx={6} cy={7} r={5} fill={item.color} />}
                    <text x={item.shape === "line" ? 18 : 14} y={11} fontSize="10" fill="#444" fontFamily="sans-serif">{item.label}</text>
                  </g>
                );
              })}
              {block.gradient && (() => {
                const gw = Math.min(usableW * 0.6, 200), gh = 12;
                const th = block.title ? TITLE_H : 0;
                const gradId = `svggrad-${bi}`;
                return (
                  <g transform={`translate(0, ${th})`}>
                    <defs><linearGradient id={gradId} x1="0%" y1="0%" x2="100%" y2="0%">
                      {block.gradient.stops.map((c, si) => <stop key={si} offset={`${si/(block.gradient.stops.length-1)*100}%`} stopColor={c} />)}
                    </linearGradient></defs>
                    <rect x={0} y={0} width={gw} height={gh} fill={`url(#${gradId})`} rx="2" />
                    <text x={0} y={gh+13} fontSize="9" fill="#555" fontFamily="sans-serif" textAnchor="start">{block.gradient.min}</text>
                    <text x={gw} y={gh+13} fontSize="9" fill="#555" fontFamily="sans-serif" textAnchor="end">{block.gradient.max}</text>
                  </g>
                );
              })()}
            </g>
          );
        });
      })()}
    </svg>);
});

const inp={background:"#fff",border:"1px solid #ccc",borderRadius:4,color:"#333",padding:"4px 8px",fontSize:12};
const inpN={width:72,background:"#fff",border:"1px solid #ccc",borderRadius:4,color:"#333",padding:"4px 8px",fontSize:13,textAlign:"center"};
const lbl={fontSize:11,color:"#777",marginBottom:2};
const sec={background:"#f8f8fa",borderRadius:10,padding:16,marginBottom:16,border:"1px solid #ddd"};
const roleColors={group:"#648FFF",value:"#2EC4B6",filter:"#FFB000",text:"#785EF0",ignore:"#ccc"};

function App(){
  const[rawText,setRawText]=useState(null),[fileName,setFileName]=useState(""),[step,setStep]=useState("upload");
  const[parseError,setParseError]=useState(null);
  const[dataFormat,setDataFormat]=useState("long");
  const[commaFixed,setCommaFixed]=useState(false),[commaFixCount,setCommaFixCount]=useState(0);
  const[parsedHeaders,setParsedHeaders]=useState([]),[parsedRows,setParsedRows]=useState([]),[hasHeader,setHasHeader]=useState(true);
  const[colRoles,setColRoles]=useState([]),[colNames,setColNames]=useState([]),[filters,setFilters]=useState({}),[valueRenames,setValueRenames]=useState({});
  const[plotTitle,setPlotTitle]=useState(""),[yLabel,setYLabel]=useState("Value"),[plotBg,setPlotBg]=useState("#ffffff"),[showGrid,setShowGrid]=useState(true),[gridColor,setGridColor]=useState("#e0e0e0");
  const[boxFillOpacity,setBoxFillOpacity]=useState(0.15);
  const[boxWidth,setBoxWidth]=useState(70),[boxGap,setBoxGap]=useState(0),[pointSize,setPointSize]=useState(2.5),[showPoints,setShowPoints]=useState(true),[jitterWidth,setJitterWidth]=useState(0.6),[pointOpacity,setPointOpacity]=useState(0.6);
  const[xLabelAngle,setXLabelAngle]=useState(0),[yMinCustom,setYMinCustom]=useState(""),[yMaxCustom,setYMaxCustom]=useState(""),[boxplotColors,setBoxplotColors]=useState({});
  const [plotGroupRenames, setPlotGroupRenames] = useState({});
  const[groupOrder,setGroupOrder]=useState([]);
  const[colorByCol,setColorByCol]=useState(-1);
  const[categoryColors,setCategoryColors]=useState({});
  const[dragIdx,setDragIdx]=useState(null);
  const[facetByCol,setFacetByCol]=useState(-1);
  const[sepOverride,setSepOverride]=useState("");
  const facetRefs=useRef({});
  const chartRef=useRef();

  const doParse=useCallback((text,sep)=>{const dc=fixDecimalCommas(text,sep);const fixedText=dc.text;setCommaFixed(dc.commaFixed);setCommaFixCount(dc.count);setRawText(fixedText);const{headers,rows,hasHeader:hh}=parseRaw(fixedText,sep);
    if(!headers.length||!rows.length){setParseError("The file appears to be empty or has no data rows. Please check your file and try again.");return;}
    setParseError(null);
    const isWide=detectWideFormat(headers,rows);
    if(isWide){
      const{headers:lh,rows:lr}=wideToLong(headers,rows);
      setParsedHeaders(lh);setParsedRows(lr);setHasHeader(true);
      setColRoles(["group","value"]);setColNames([...lh]);
      const f={};lh.forEach((_,i)=>{const u=[...new Set(lr.map(r=>r[i]))].sort();f[i]={unique:u,included:new Set(u)};});
      setFilters(f);setValueRenames({});setBoxplotColors({});setPlotGroupRenames({});setGroupOrder([]);setColorByCol(-1);setCategoryColors({});setFacetByCol(-1);setYMinCustom("");setYMaxCustom("");setDataFormat("wide");setStep("plot");
    }else{
      setParsedHeaders(headers);setParsedRows(rows);setHasHeader(hh);setColRoles(headers.map((_,i)=>guessColumnType(rows.map(r=>r[i]))));setColNames([...headers]);const f={};headers.forEach((_,i)=>{const u=[...new Set(rows.map(r=>r[i]))].sort();f[i]={unique:u,included:new Set(u)};});setFilters(f);setValueRenames({});setBoxplotColors({});setPlotGroupRenames({});setGroupOrder([]);setColorByCol(-1);setCategoryColors({});setFacetByCol(-1);setYMinCustom("");setYMaxCustom("");setDataFormat("long");setStep("configure");
    }
  },[]);
  const handleFileLoad=useCallback((text,name)=>{setFileName(name);doParse(text,sepOverride);},[sepOverride,doParse]);
  const resetAll=()=>{setRawText(null);setParsedRows([]);setParsedHeaders([]);setFileName("");setStep("upload");};

  const applyRename=(ci,v)=>(valueRenames[ci]&&valueRenames[ci][v]!=null)?valueRenames[ci][v]:v;
  const filteredRows=useMemo(()=>parsedRows.filter(r=>r.every((v,ci)=>!filters[ci]||filters[ci].included.has(v))),[parsedRows,filters]);
  const renamedRows=useMemo(()=>filteredRows.map(r=>r.map((v,ci)=>applyRename(ci,v))),[filteredRows,valueRenames]);
  const activeColIdxs=useMemo(()=>colRoles.reduce((acc,r,i)=>{if(r!=="ignore")acc.push(i);return acc;},[]),[colRoles]);
  const groupColIdx=colRoles.indexOf("group"),valueColIdx=colRoles.indexOf("value");
  const groupedData=useMemo(()=>{if(groupColIdx<0||valueColIdx<0)return{};const g={};renamedRows.forEach(r=>{const k=r[groupColIdx];if(!g[k])g[k]=[];g[k].push(r[valueColIdx]);});return g;},[renamedRows,groupColIdx,valueColIdx]);
  const stats=useMemo(()=>computeGroupStats(groupedData),[groupedData]);
  const wideData=useMemo(()=>(groupColIdx<0||valueColIdx<0)?null:reshapeWide(renamedRows,groupColIdx,valueColIdx),[renamedRows,groupColIdx,valueColIdx]);

  const naturalGroupOrder=useMemo(()=>{if(groupColIdx<0||valueColIdx<0)return[];const seen=new Set(),order=[];renamedRows.forEach(r=>{const g=r[groupColIdx];if(!seen.has(g)){seen.add(g);order.push(g);}});return order;},[renamedRows,groupColIdx,valueColIdx]);
  const effectiveOrder=useMemo(()=>{if(groupOrder.length>0){const valid=groupOrder.filter(g=>naturalGroupOrder.includes(g));const missing=naturalGroupOrder.filter(g=>!groupOrder.includes(g));return[...valid,...missing];}return naturalGroupOrder;},[groupOrder,naturalGroupOrder]);
  const colorByCandidates=useMemo(()=>parsedHeaders.map((_,i)=>i).filter(i=>i!==groupColIdx&&i!==valueColIdx&&(colRoles[i]==="filter"||colRoles[i]==="group"||colRoles[i]==="text")),[parsedHeaders,groupColIdx,valueColIdx,colRoles]);
  const colorByCategories=useMemo(()=>{if(colorByCol<0)return[];return[...new Set(renamedRows.map(r=>r[colorByCol]))].sort();},[colorByCol,renamedRows]);
  const boxplotGroups=useMemo(()=>{if(groupColIdx<0||valueColIdx<0)return[];const gm={};renamedRows.forEach(r=>{const g=r[groupColIdx],v=Number(r[valueColIdx]);if(r[valueColIdx]===""||isNaN(v))return;if(!gm[g])gm[g]={};if(colorByCol>=0){const cat=r[colorByCol]||"?";if(!gm[g][cat])gm[g][cat]=[];gm[g][cat].push(v);}else{if(!gm[g]["_all"])gm[g]["_all"]=[];gm[g]["_all"].push(v);}});const cats=colorByCol>=0?colorByCategories:["_all"];return effectiveOrder.filter(name=>gm[name]).map((name,gi)=>{const catMap=gm[name];const sources=cats.filter(c=>catMap[c]).map((cat,si)=>({colIndex:si,values:catMap[cat],category:cat}));const allValues=sources.flatMap(s=>s.values);return{name,sources,allValues,stats:quartiles(allValues),color:boxplotColors[name]||PALETTE[gi%PALETTE.length]};});},[renamedRows,groupColIdx,valueColIdx,boxplotColors,effectiveOrder,colorByCol,colorByCategories]);

  const displayBoxplotGroups = useMemo(() =>
    boxplotGroups.map(g => ({ ...g, name: plotGroupRenames[g.name] ?? g.name })),
    [boxplotGroups, plotGroupRenames]

  // Facet column candidates (same pool as colorBy)

      const catRows=renamedRows.filter(r=>r[facetByCol]===cat);
      const gm={};

        if(colorByCol>=0){const cc=r[colorByCol]||"?";if(!gm[g][cc])gm[g][cc]=[];gm[g][cc].push(v);}
        else{if(!gm[g]["_all"])gm[g]["_all"]=[];gm[g]["_all"].push(v);}
      });

      const groups=effectiveOrder.filter(name=>gm[name]).map((name,gi)=>{const catMap=gm[name];const sources=cats.filter(c=>catMap[c]).map((c,si)=>({colIndex:si,values:catMap[c],category:c}));const allValues=sources.flatMap(s=>s.values);return{name,sources,allValues,stats:quartiles(allValues),color:boxplotColors[name]||PALETTE[gi%PALETTE.length]};});

  },[facetByCol,facetByCategories,colorByCol,colorByCategories,renamedRows,groupColIdx,valueColIdx,effectiveOrder,boxplotColors]);

  const toggleFilter=(ci,v)=>setFilters(p=>{const f={...p},s=new Set(f[ci].included);if(s.has(v))s.delete(v);else s.add(v);f[ci]={...f[ci],included:s};return f;});
  const toggleAllFilter=(ci,all)=>setFilters(p=>{const f={...p};f[ci]={...f[ci],included:all?new Set(f[ci].unique):new Set()};return f;});
  const setRenameVal=(ci,ov,nv)=>setValueRenames(p=>{const r={...p};if(!r[ci])r[ci]={};r[ci]={...r[ci],[ov]:nv};return r;});
  const updateRole=(i,role)=>setColRoles(p=>p.map((r,j)=>j===i?role:r));
  const updateColName=(i,nm)=>setColNames(p=>p.map((n,j)=>j===i?nm:n));

  const yMinVal=yMinCustom!==""?Number(yMinCustom):null,yMaxVal=yMaxCustom!==""?Number(yMaxCustom):null;
  const valueColIsNumeric=useMemo(()=>{if(valueColIdx<0||!parsedRows.length)return true;const vals=parsedRows.map(r=>r[valueColIdx]).filter(v=>v!=="");return vals.length>0&&vals.filter(v=>!isNaN(Number(v))).length/vals.length>0.5;},[parsedRows,valueColIdx]);
  const canPlot=groupColIdx>=0&&valueColIdx>=0&&valueColIsNumeric&&boxplotGroups.length>0;

  return(

                <button onClick={(e)=>{if(facetByCol>=0&&facetedData.length>0){facetedData.forEach(fd=>downloadSvg(facetRefs.current[fd.category],`boxplot_${fd.category}.svg`));}else{downloadSvg(chartRef.current,"boxplot.svg");}flashSaved(e.currentTarget);}} style={{padding:"8px 14px",borderRadius:6,fontSize:12,cursor:"pointer",background:"#16a34a",border:"none",color:"#fff",fontFamily:"inherit",width:"100%",fontWeight:600}}>⬇ Download SVG</button>
                <button onClick={()=>setStep("output")} style={{padding:"8px 14px",borderRadius:6,fontSize:12,cursor:"pointer",background:"#fff",border:"1px solid #ccc",color:"#555",fontFamily:"inherit",width:"100%"}}>← Output</button>
                <button onClick={()=>setStep("filter")} style={{padding:"8px 14px",borderRadius:6,fontSize:12,cursor:"pointer",background:"#fff",border:"1px solid #ccc",color:"#555",fontFamily:"inherit",width:"100%"}}>← Filter</button>
                <button onClick={resetAll} style={{padding:"8px 14px",borderRadius:6,fontSize:12,cursor:"pointer",background:"#fef2f2",border:"1px solid #fca5a5",color:"#dc2626",fontFamily:"inherit",width:"100%"}}>↺ Start over</button>
              </div>
            </div>

            {/* Conditions */}
            <div style={{...sec,marginBottom:0}}>
              <p style={{margin:"0 0 6px",fontSize:11,color:"#666"}}>{boxplotGroups.length} condition{boxplotGroups.length>1?"s":""} · {renamedRows.length} obs</p>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {boxplotGroups.map(g=>(
                  <div key={g.name} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 8px",borderRadius:6,fontSize:12,background:"#f0f0f5",border:"1px solid #ccc"}}>
                    <ColorInput value={g.color} onChange={c=>setBoxplotColors(p=>({...p,[g.name]:c}))} size={18}/>
                    <input value={plotGroupRenames[g.name]??g.name}
                      onChange={e=>setPlotGroupRenames(p=>({...p,[g.name]:e.target.value}))}
                      style={{flex:1,minWidth:0,background:"#fff",border:"1px solid #ccc",borderRadius:4,color:"#333",padding:"2px 4px",fontSize:11,fontFamily:"inherit"}}/>
                    <span style={{color:"#999",fontSize:10}}>n={g.stats?.n||0}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Style controls */}
            <div style={{...sec,padding:12,marginBottom:0,display:"flex",flexDirection:"column",gap:9}}>
              {/* Inline controls (checkbox / color picker) */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={lbl}>Background</span><ColorInput value={plotBg} onChange={setPlotBg} size={24}/></div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={lbl}>Grid</span><input type="checkbox" checked={showGrid} onChange={e=>setShowGrid(e.target.checked)} style={{accentColor:"#648FFF"}}/></div>
              {showGrid&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={lbl}>Grid color</span><ColorInput value={gridColor} onChange={setGridColor} size={24}/></div>}
              {/* Sliders: label + value on top row, slider full-width below */}
              {[
                {label:"Box width", val:boxWidth+"%", min:20, max:100, step:5, value:boxWidth, set:setBoxWidth},
                {label:"Box gap",   val:boxGap+"%",   min:0,  max:80,  step:5, value:boxGap,   set:setBoxGap},
                {label:"Box opacity", val:boxFillOpacity.toFixed(2), min:0, max:1, step:0.05, value:boxFillOpacity, set:setBoxFillOpacity},
              ].map(({label,val,min,max,step,value,set})=>(
                <div key={label}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={lbl}>{label}</span><span style={{fontSize:10,color:"#999"}}>{val}</span></div>
                  <input type="range" min={min} max={max} step={step} value={value} onChange={e=>set(Number(e.target.value))} style={{width:"100%",accentColor:"#648FFF"}}/>
                </div>
              ))}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={lbl}>Points</span><input type="checkbox" checked={showPoints} onChange={e=>setShowPoints(e.target.checked)} style={{accentColor:"#648FFF"}}/></div>
              {showPoints&&(<>
                <div>
                  <div style={lbl}>Color by</div>
                  <select value={colorByCol} onChange={e=>{const v=Number(e.target.value);setColorByCol(v);if(v>=0){const cats=[...new Set(renamedRows.map(r=>r[v]))].sort();const cc={};cats.forEach((c,ci)=>{cc[c]=PALETTE[(ci+2)%PALETTE.length];});setCategoryColors(cc);}}} style={{...inp,cursor:"pointer",fontSize:11,width:"100%"}}>
                    <option value={-1}>— none —</option>
                    {colorByCandidates.map(ci=><option key={ci} value={ci}>{colNames[ci]}</option>)}
                  </select>
                </div>
                {colorByCol>=0&&colorByCategories.map(cat=>(
                  <div key={cat} style={{display:"flex",alignItems:"center",gap:4,paddingLeft:8}}>
                    <ColorInput value={categoryColors[cat]||"#999999"} onChange={c=>setCategoryColors(p=>({...p,[cat]:c}))} size={16}/>
                    <span style={{fontSize:10,color:"#555"}}>{cat}</span>
                  </div>
                ))}
                {[
                  {label:"Size",    val:pointSize,             min:1,   max:6, step:0.5,  value:pointSize,    set:setPointSize},
                  {label:"Jitter",  val:jitterWidth.toFixed(2),min:0,   max:1, step:0.05, value:jitterWidth,  set:setJitterWidth},
                  {label:"Opacity", val:pointOpacity.toFixed(2),min:0.1,max:1, step:0.05, value:pointOpacity, set:setPointOpacity},
                ].map(({label,val,min,max,step,value,set})=>(
                  <div key={label}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={lbl}>{label}</span><span style={{fontSize:10,color:"#999"}}>{val}</span></div>
                    <input type="range" min={min} max={max} step={step} value={value} onChange={e=>set(Number(e.target.value))} style={{width:"100%",accentColor:"#648FFF"}}/>
                  </div>
                ))}
              </>)}
              <div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={lbl}>X angle</span><span style={{fontSize:10,color:"#999"}}>{xLabelAngle}°</span></div>
                <input type="range" min="-90" max="0" step="5" value={xLabelAngle} onChange={e=>setXLabelAngle(Number(e.target.value))} style={{width:"100%",accentColor:"#648FFF"}}/>
              </div>
              <div>
                <div style={lbl}>Facet by</div>
                <select value={facetByCol} onChange={e=>setFacetByCol(Number(e.target.value))} style={{...inp,cursor:"pointer",fontSize:11,width:"100%"}}>
                  <option value={-1}>— none —</option>
                  {colorByCandidates.map(ci=><option key={ci} value={ci}>{colNames[ci]}</option>)}
                </select>
              </div>
            </div>

            {/* Plot params */}
            <div style={{...sec,padding:12,marginBottom:0,display:"flex",flexDirection:"column",gap:8}}>
              <div><div style={lbl}>Title</div><input value={plotTitle} onChange={e=>setPlotTitle(e.target.value)} style={{...inp,width:"100%",fontSize:11}}/></div>
              <div><div style={lbl}>Y label</div><input value={yLabel} onChange={e=>setYLabel(e.target.value)} style={{...inp,width:"100%",fontSize:11}}/></div>
              <div style={{display:"flex",gap:8}}>
                <div style={{flex:1}}><div style={lbl}>Y min</div><input value={yMinCustom} onChange={e=>setYMinCustom(e.target.value)} style={{...inp,width:"100%",fontSize:11}} placeholder="auto"/></div>
                <div style={{flex:1}}><div style={lbl}>Y max</div><input value={yMaxCustom} onChange={e=>setYMaxCustom(e.target.value)} style={{...inp,width:"100%",fontSize:11}} placeholder="auto"/></div>
              </div>
            </div>

          </div>

          {/* ── RIGHT: chart area ── */}
          <div style={{flex:1,minWidth:0}}>
            {colorByCol>=0&&colorByCategories.length>0&&(
              <div style={{marginBottom:12,background:"#f8f8fa",borderRadius:8,padding:"8px 14px",border:"1px solid #ddd",display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontSize:11,color:"#777"}}>Points colored by: {colNames[colorByCol]}</span>
                {colorByCategories.map(cat=>(
                  <div key={cat} style={{display:"flex",alignItems:"center",gap:4}}>
                    <div style={{width:10,height:10,borderRadius:"50%",background:categoryColors[cat]||"#999"}}/>
                    <span style={{fontSize:11,color:"#444"}}>{cat}</span>
                  </div>
                ))}
              </div>
            )}
            {(facetByCol<0)&&(
              <div style={{background:"#fff",borderRadius:10,padding:20,border:"1px solid #ddd"}}>
                <BoxplotChart ref={chartRef} groups={displayBoxplotGroups} yLabel={yLabel} plotTitle={plotTitle} plotBg={plotBg} showGrid={showGrid} gridColor={gridColor} boxWidth={boxWidth} boxFillOpacity={boxFillOpacity} pointSize={pointSize} showPoints={showPoints} jitterWidth={jitterWidth} pointOpacity={pointOpacity} xLabelAngle={xLabelAngle} yMin={yMinVal} yMax={yMaxVal} categoryColors={categoryColors} colorByCol={colorByCol} boxGap={boxGap}
                  svgLegend={colorByCol >= 0 && colorByCategories.length > 0 ? [{
                    title: `Points colored by: ${colNames[colorByCol]}`,
                    items: colorByCategories.map(c => ({ label: c, color: categoryColors[c] || "#999", shape: "dot" }))
                  }] : null}/>
              </div>
            )}
            {facetByCol>=0&&facetedData.length>0&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:16}}>
                {facetedData.map(fd=>{
                  const displayFdGroups = fd.groups.map(g => ({...g, name: plotGroupRenames[g.name]??g.name}));
                  return (
                  <div key={fd.category} style={{background:"#fff",borderRadius:8,padding:12,border:"1px solid #ddd",flex:"0 1 auto",minWidth:180}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                      <div style={{width:10,height:10,borderRadius:"50%",background:categoryColors[fd.category]||"#999"}}/>
                      <p style={{margin:0,fontSize:13,fontWeight:600,color:"#333"}}>{fd.category}</p>
                      <span style={{fontSize:11,color:"#999"}}>({fd.groups.reduce((a,g)=>a+g.allValues.length,0)} pts)</span>
                    </div>
                    <BoxplotChart ref={el=>{facetRefs.current[fd.category]=el;}} groups={displayFdGroups} yLabel={yLabel} plotTitle={[plotTitle, fd.category].filter(Boolean).join(" — ")} plotBg={plotBg} showGrid={showGrid} gridColor={gridColor} boxWidth={boxWidth} boxFillOpacity={boxFillOpacity} pointSize={pointSize} showPoints={showPoints} jitterWidth={jitterWidth} pointOpacity={pointOpacity} xLabelAngle={xLabelAngle} yMin={yMinVal} yMax={yMaxVal} categoryColors={categoryColors} colorByCol={colorByCol} boxGap={boxGap}
                      svgLegend={colorByCol >= 0 && colorByCategories.length > 0 ? [{
                        title: `Points colored by: ${colNames[colorByCol]}`,
                        items: colorByCategories.map(c => ({ label: c, color: categoryColors[c] || "#999", shape: "dot" }))
                      }] : null}/>
                  </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}

      {step==="plot"&&!canPlot&&(<div style={{...sec,background:"#fff8e8",borderColor:"#f0d060"}}><p style={{fontSize:12,color:"#886600"}}>⚠ Assign <strong>group</strong> + <strong>value</strong> columns and ensure filters keep data.</p><button onClick={()=>setStep("configure")} style={{marginTop:8,padding:"6px 14px",borderRadius:6,fontSize:12,cursor:"pointer",background:"#fff",border:"1px solid #ccc",color:"#555",fontFamily:"inherit"}}>← Configure</button></div>)}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
